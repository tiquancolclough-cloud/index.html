<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="EtzQT">
<meta name="theme-color" content="#0f1117">
<title>EtzQT Schedule</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap');
:root {
  --bg:#0f1117; --surface:#181c27; --card:#1e2335; --border:#2a2f45;
  --accent:#f4a72a; --adim:rgba(244,167,42,0.13);
  --green:#3dd68c; --gdim:rgba(61,214,140,0.13);
  --red:#ff5f5f;
  --muted:#6b7280; --text:#e8eaf0; --sub:#9aa0b4;
  --r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overscroll-behavior:none;}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;font-size:14px;}

header{background:var(--surface);border-bottom:1px solid var(--border);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Space Grotesk',sans-serif;font-size:17px;font-weight:700;color:var(--text);}
.logo span{color:var(--accent);}
.week-nav{display:flex;align-items:center;gap:8px;}
.wk-label{font-family:'Space Grotesk',sans-serif;font-size:11px;color:var(--sub);min-width:140px;text-align:center;}
.nav-btn{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:7px;width:32px;height:32px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.nav-btn:active{background:var(--accent);color:#0f1117;}

main{max-width:1000px;margin:0 auto;padding:14px 10px 80px;}

.rates-bar{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;flex-wrap:wrap;gap:12px;}
.rl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);}
.rf{display:flex;align-items:center;gap:7px;}
.rn{font-size:12px;font-weight:600;color:var(--sub);}
.rw{position:relative;}
.rw em{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--accent);font-style:normal;font-size:12px;font-weight:700;pointer-events:none;}
.ri{background:var(--card);border:1px solid var(--border);color:var(--text);border-radius:7px;padding:6px 6px 6px 20px;width:78px;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;-webkit-appearance:none;}
.ri:focus{outline:none;border-color:var(--accent);}

.sum-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:11px 13px;}
.sc.tot{background:var(--adim);border-color:rgba(244,167,42,.3);}
.sn{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:2px;}
.ss{font-size:10px;color:var(--sub);margin-bottom:3px;}
.sp{font-family:'Space Grotesk',sans-serif;font-size:18px;font-weight:700;color:var(--accent);}

.gh{display:grid;grid-template-columns:82px repeat(6,1fr);gap:5px;margin-bottom:5px;}
.gh>div{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);text-align:center;padding:3px 0;}
.gh .tdy{color:var(--accent);}
.dn{display:block;font-family:'Space Grotesk',sans-serif;font-size:16px;font-weight:700;color:var(--text);margin-top:1px;}
.tdy .dn{color:var(--accent);}

.pr{display:grid;grid-template-columns:82px repeat(6,1fr);gap:5px;margin-bottom:5px;}
.pl{display:flex;align-items:center;gap:5px;padding:7px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);}
.av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;flex-shrink:0;}
.av-ty{background:rgba(244,167,42,.2);color:var(--accent);}
.av-an{background:rgba(61,214,140,.2);color:var(--green);}
.av-da{background:rgba(139,150,255,.2);color:#8b96ff;}
.pname{font-size:10px;font-weight:700;color:var(--text);}
.prole{font-size:9px;color:var(--muted);}

.cell{border-radius:var(--r);border:1.5px dashed var(--border);background:var(--surface);min-height:62px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:4px;touch-action:manipulation;user-select:none;}
.cell:active{transform:scale(.96);}
.cell.on{border-style:solid;border-color:var(--green);background:var(--gdim);}
.cell.sun{border-color:transparent!important;background:transparent!important;opacity:.15;pointer-events:none;}
.ci{font-size:14px;}
.cs{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);}
.cell.on .cs{color:var(--green);}
.cn{font-size:8px;color:var(--sub);text-align:center;max-width:65px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cp{font-size:9px;font-weight:700;color:var(--accent);}

.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:200;align-items:flex-end;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:18px 18px 0 0;padding:20px 20px 28px;width:100%;max-width:460px;}
.handle{width:34px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 14px;}
.modal h3{font-family:'Space Grotesk',sans-serif;font-size:15px;font-weight:700;margin-bottom:13px;}
.modal label{display:block;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:5px;}
.modal input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:11px 13px;font-family:'Inter',sans-serif;font-size:14px;margin-bottom:14px;-webkit-appearance:none;}
.modal input:focus{outline:none;border-color:var(--accent);}
.ma{display:flex;gap:8px;}
.btn{flex:1;padding:12px;border-radius:10px;border:none;font-family:'Inter',sans-serif;font-size:13px;font-weight:700;cursor:pointer;touch-action:manipulation;}
.btn:active{opacity:.75;}
.bs{background:var(--accent);color:#0f1117;}
.bd{background:var(--red);color:#fff;}
.bc{background:var(--border);color:var(--text);}

.foot{text-align:center;color:var(--muted);font-size:10px;margin-top:24px;}

@media(max-width:580px){
  .gh,.pr{grid-template-columns:60px repeat(6,1fr);gap:4px;}
  .pl{padding:5px;gap:3px;}
  .av{width:19px;height:19px;font-size:7px;}
  .prole{display:none;}
  .pname{font-size:9px;}
  .cell{min-height:52px;}
  .sum-row{grid-template-columns:repeat(2,1fr);}
}
@media(max-width:360px){
  .gh,.pr{grid-template-columns:48px repeat(6,1fr);gap:3px;}
  .cell{min-height:44px;}
  .ci{font-size:11px;}
  main{padding:10px 6px 70px;}
}
</style>
</head>
<body>
<header>
  <div class="logo">Etz<span>QT</span></div>
  <div class="week-nav">
    <button class="nav-btn" id="prev">&#8592;</button>
    <div class="wk-label" id="wkLabel"></div>
    <button class="nav-btn" id="next">&#8594;</button>
  </div>
</header>
<main>
  <div class="rates-bar">
    <span class="rl">Daily Rates</span>
    <div class="rf"><span class="rn">Ty</span><div class="rw"><em>$</em><input class="ri" id="r-ty" type="number" inputmode="numeric" min="0" step="5" value="0"></div></div>
    <div class="rf"><span class="rn">Anthony</span><div class="rw"><em>$</em><input class="ri" id="r-anthony" type="number" inputmode="numeric" min="0" step="5" value="150"></div></div>
    <div class="rf"><span class="rn">Damarien</span><div class="rw"><em>$</em><input class="ri" id="r-damarien" type="number" inputmode="numeric" min="0" step="5" value="100"></div></div>
  </div>
  <div class="sum-row" id="summary"></div>
  <div class="gh" id="gHeader"><div></div></div>
  <div id="grid"></div>
  <p class="foot">Tap a cell to add or remove a shift &nbsp;·&nbsp; Saves on your device</p>
</main>
<div class="overlay" id="overlay">
  <div class="modal">
    <div class="handle"></div>
    <h3 id="mTitle"></h3>
    <label>Route / Note (optional)</label>
    <input id="mNote" type="text" autocomplete="off" placeholder="e.g. Lowe's Columbia run…">
    <div class="ma">
      <button class="btn bc" id="mCancel">Cancel</button>
      <button class="btn bd" id="mDel" style="display:none">Remove</button>
      <button class="btn bs" id="mSave">Confirm</button>
    </div>
  </div>
</div>
<script>
const CREW=[
  {id:'ty',      name:'Ty',      role:'Owner-Op',av:'av-ty',init:'TY',rid:'r-ty'},
  {id:'anthony', name:'Anthony', role:'Driver',  av:'av-an',init:'AN',rid:'r-anthony'},
  {id:'damarien',name:'Damarien',role:'Helper',  av:'av-da',init:'DA',rid:'r-damarien'},
];
const WD=[6,1,2,3,4,5];
const DS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DF=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

let off=0;
let sched=ld('etzSched',{});
let rates=ld('etzRates',{ty:0,anthony:150,damarien:100});
let ctx=null;

function ld(k,d){try{return JSON.parse(localStorage.getItem(k))??d;}catch{return d;}}
function sv(k,v){localStorage.setItem(k,JSON.stringify(v));}
function syncR(){CREW.forEach(p=>{rates[p.id]=parseFloat(document.getElementById(p.rid).value)||0;});sv('etzRates',rates);}

function wkDates(o){
  const t=new Date();t.setHours(0,0,0,0);
  const s=new Date(t);s.setDate(t.getDate()-((t.getDay()+1)%7)+o*7);
  return WD.map(d=>{const dt=new Date(s);dt.setDate(s.getDate()+((d-6+7)%7));return dt;});
}
function dk(dt){return dt.toISOString().slice(0,10);}
function df(dt){return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});}

function render(){
  const dates=wkDates(off);
  const today=new Date();today.setHours(0,0,0,0);
  document.getElementById('wkLabel').textContent=`${df(dates[0])} – ${df(dates[dates.length-1])}`;

  const hdr=document.getElementById('gHeader');
  hdr.innerHTML='<div></div>';
  dates.forEach(dt=>{
    const isTdy=dt.getTime()===today.getTime();
    const d=document.createElement('div');
    d.className=isTdy?'tdy':'';
    d.innerHTML=`${DS[dt.getDay()]}<span class="dn">${dt.getDate()}</span>`;
    hdr.appendChild(d);
  });

  const grid=document.getElementById('grid');
  grid.innerHTML='';
  CREW.forEach(p=>{
    const row=document.createElement('div');
    row.className='pr';
    const lbl=document.createElement('div');
    lbl.className='pl';
    lbl.innerHTML=`<div class="av ${p.av}">${p.init}</div><div><div class="pname">${p.name}</div><div class="prole">${p.role}</div></div>`;
    row.appendChild(lbl);
    dates.forEach(dt=>{
      const k=dk(dt),shift=sched[p.id]?.[k],isSun=dt.getDay()===0;
      const cell=document.createElement('div');
      if(isSun){
        cell.className='cell sun';
        cell.innerHTML='<span class="ci">🚫</span>';
      } else if(shift){
        const pay=rates[p.id]||0;
        cell.className='cell on';
        cell.innerHTML=`<span class="ci">✅</span><span class="cs">Working</span>${shift.note?`<span class="cn">${shift.note}</span>`:''}${pay?`<span class="cp">$${pay}</span>`:''}`;
        cell.onclick=()=>openM(p,dt,k,true);
      } else {
        cell.className='cell';
        cell.innerHTML='<span class="ci">＋</span><span class="cs">Add</span>';
        cell.onclick=()=>openM(p,dt,k,false);
      }
      row.appendChild(cell);
    });
    grid.appendChild(row);
  });
  renderSum(dates);
}

function renderSum(dates){
  const el=document.getElementById('summary');
  el.innerHTML='';
  let grand=0;
  CREW.forEach(p=>{
    let days=0;
    dates.forEach(dt=>{if(dt.getDay()!==0&&sched[p.id]?.[dk(dt)])days++;});
    const pay=days*(rates[p.id]||0);
    grand+=pay;
    el.innerHTML+=`<div class="sc"><div class="sn">${p.name}</div><div class="ss">${days} shift${days!==1?'s':''}</div><div class="sp">${rates[p.id]?'$'+pay.toLocaleString():'—'}</div></div>`;
  });
  el.innerHTML+=`<div class="sc tot"><div class="sn">Payroll</div><div class="ss">Weekly total</div><div class="sp">$${grand.toLocaleString()}</div></div>`;
}

function openM(p,dt,k,ex){
  ctx={pid:p.id,k};
  const shift=sched[p.id]?.[k];
  document.getElementById('mTitle').textContent=`${p.name} · ${DF[dt.getDay()]} ${df(dt)}`;
  document.getElementById('mNote').value=shift?.note||'';
  document.getElementById('mDel').style.display=ex?'flex':'none';
  document.getElementById('mSave').textContent=ex?'Update':'Confirm';
  document.getElementById('overlay').classList.add('open');
  setTimeout(()=>document.getElementById('mNote').focus(),80);
}
function closeM(){document.getElementById('overlay').classList.remove('open');ctx=null;}

document.getElementById('mSave').onclick=()=>{
  if(!ctx)return;
  if(!sched[ctx.pid])sched[ctx.pid]={};
  sched[ctx.pid][ctx.k]={note:document.getElementById('mNote').value.trim()};
  sv('etzSched',sched);closeM();render();
};
document.getElementById('mDel').onclick=()=>{
  if(!ctx)return;
  if(sched[ctx.pid])delete sched[ctx.pid][ctx.k];
  sv('etzSched',sched);closeM();render();
};
document.getElementById('mCancel').onclick=closeM;
document.getElementById('overlay').onclick=e=>{if(e.target.id==='overlay')closeM();};
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();});
document.getElementById('prev').onclick=()=>{off--;render();};
document.getElementById('next').onclick=()=>{off++;render();};
CREW.forEach(p=>{
  document.getElementById(p.rid).value=rates[p.id]??0;
  document.getElementById(p.rid).oninput=()=>{syncR();render();};
});
render();
</script>
</body>
</html>
